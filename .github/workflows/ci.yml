on:
  push:
  pull_request:
    branches: [main]
jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.18"
      - name: Install development dependencies
        run: shards install
      - name: Run tests
        run: make

  verify-macos:
    runs-on: macos-latest
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.18"
      - name: Install development dependencies
        run: shards install
      - name: Run tests
        run: make spec
